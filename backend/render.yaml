# Render Blueprint for SkillTok Backend
services:
  - type: web
    name: skilltok-backend
    runtime: node
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080

databases:
  - name: skilltok-db
    databaseName: skilltok
    user: skilltok_admin
